name: Update Sportzx Playlists

on:
  schedule:
    # Try to run every 5 minutes (subject to GitHub delays)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run it manually via the Actions tab

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Grants the runner permission to push the updated files back

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sportzx Script
      run: python file.py

    - name: Commit and Push Generated Files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Stages all newly generated or modified files, including file.txt
        git add web-view-urls.json events.json file.txt
        
        # '|| exit 0' ensures the action doesn't fail if the files happen to be identical
        git commit -m "Auto-update playlists and file.txt: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || exit 0
        git push
